<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夏小厨点餐系统</title>
    <meta name="theme-color" content="#667eea">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;padding:15px;padding-bottom:80px}
        .header{text-align:center;padding:20px 0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-radius:12px;margin-bottom:20px;position:relative;box-shadow:0 4px 12px rgba(102,126,234,.3)}
        .header h1{font-size:22px;font-weight:600}
        .header a{position:absolute;top:12px;right:12px;color:#fff;text-decoration:none;font-size:13px;opacity:.9;background:rgba(255,255,255,.2);padding:6px 12px;border-radius:20px}
        .cloud-badge{background:#27ae60;color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;position:absolute;top:12px;left:12px}
        .loading{text-align:center;padding:60px 20px;color:#999}
        .category{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .category-title{font-size:17px;font-weight:600;color:#333;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #667eea}
        .item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #f0f0f0}
        .item:last-child{border-bottom:none}
        .item-info{flex:1;padding-right:12px}
        .item-name{font-size:15px;color:#333;font-weight:500;margin-bottom:4px}
        .item-price{color:#e74c3c;font-weight:600;font-size:16px}
        .add-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:8px 18px;border-radius:20px;cursor:pointer;font-size:16px;font-weight:600;min-width:40px;box-shadow:0 2px 8px rgba(102,126,234,.3)}
        .cart-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:16px 20px;box-shadow:0 -4px 12px rgba(0,0,0,.1);display:none;z-index:999}
        .cart-bar.show{display:flex;justify-content:space-between;align-items:center}
        .cart-count{background:#e74c3c;color:#fff;padding:2px 8px;border-radius:12px;font-size:13px;margin-right:6px;font-weight:600}
        .cart-total{color:#e74c3c;font-weight:600;font-size:17px}
        .checkout-btn{background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);color:#fff;border:none;padding:12px 28px;border-radius:25px;cursor:pointer;font-size:15px;font-weight:600;box-shadow:0 4px 12px rgba(231,76,60,.3)}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;padding:20px}
        .modal.show{display:flex}
        .modal-content{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto}
        .modal-title{font-size:19px;font-weight:600;color:#333;margin-bottom:16px;text-align:center}
        .order-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
        .order-item:last-child{border-bottom:none}
        .order-total{text-align:right;font-size:18px;font-weight:600;color:#e74c3c;margin-top:16px;padding-top:16px;border-top:2px solid #f0f0f0}
        .pay-btn{background:linear-gradient(135deg,#27ae60 0%,#219a52 100%);color:#fff;border:none;padding:16px;border-radius:12px;width:100%;font-size:17px;font-weight:600;margin-top:20px;cursor:pointer;box-shadow:0 4px 12px rgba(39,174,96,.3)}
        .pay-btn:disabled{background:#bdc3c7;cursor:not-allowed;box-shadow:none}
        .close-btn{background:#f0f0f0;color:#666;border:none;padding:14px;border-radius:12px;margin-top:12px;width:100%;cursor:pointer;font-size:15px}
        .success-msg{text-align:center;padding:20px 0}
        .success-icon{font-size:64px;color:#27ae60;margin-bottom:16px}
        .success-msg h2{font-size:20px;color:#333;margin-bottom:8px}
        .success-msg p{color:#666;margin-bottom:20px}
        .order-number{background:#f8f9fa;padding:16px;border-radius:10px;margin:20px 0;font-family:monospace;font-size:15px;color:#667eea;font-weight:600;border:1px solid #e9ecef}
    </style>
</head>
<body>
    <div class="header"><h1>🍽️ 夏小厨点餐系统</h1><span class="cloud-badge" id="cloudBadge">📱 本地存储</span><a href="admin.html">管理后台</a></div>
    <div id="menu"><div class="loading">加载中...</div></div>
    <div class="cart-bar" id="cartBar"><div class="cart-info"><span class="cart-count" id="cartCount">0</span><span>合计：<span class="cart-total">¥<span id="cartTotal">0</span></span></span></div><button class="checkout-btn" onclick="showCart()">去结算</button></div>
    <div class="modal" id="cartModal"><div class="modal-content"><div class="modal-title">订单确认</div><div id="orderItems"></div><div class="order-total">总计：¥<span id="orderTotal">0</span></div><button class="pay-btn" id="payBtn" onclick="pay()">💳 立即支付</button><button class="close-btn" onclick="closeCart()">继续点餐</button></div></div>
    <div class="modal" id="successModal"><div class="modal-content"><div class="success-msg"><div class="success-icon">✓</div><h2>支付成功！</h2><p id="successMsg">订单已保存</p><div class="order-number">订单号：<span id="orderNumber"></span></div><button class="close-btn" onclick="closeSuccess()">返回首页</button></div></div></div>
    <script>
        const API_BASE=window.location.hostname!=='localhost'&&window.location.hostname!=='qqdwzl.github.io'?window.location.origin+'/api':'';
        const localMenuData=[{category:'特色',items:[{name:'一雷虾球',price:28},{name:'一顺辣条',price:25}]},{category:'凉菜',items:[{name:'一令莴苣丝',price:12},{name:'一令豆腐丝',price:15}]},{category:'咖啡饮品',items:[{name:'一雨玫瑰拿铁',price:8},{name:'一锦橙 C 美式',price:6}]},{category:'甜品',items:[{name:'一西紫米糕',price:18},{name:'一西黄米糕',price:18}]}];
        let menuData=[],cart=[];
        function updateCloudBadge(){const b=document.getElementById('cloudBadge'),p=document.getElementById('successMsg');if(API_BASE){b.textContent='☁️ 云端存储';b.style.background='#27ae60';p.textContent='订单已同步到云端'}else{b.textContent='📱 本地存储';b.style.background='#95a5a6';p.textContent='订单已保存（本地）'}}
        async function loadMenu(){if(API_BASE){try{const r=await fetch(`${API_BASE}/menu`),d=await r.json();if(d.success&&Object.keys(d.data).length>0){menuData=Object.entries(d.data).map(([c,i])=>({category:c,items:i.map(x=>({name:x.name,price:x.price}))}))}else throw new Error(d.error||'无数据')}catch(e){console.error(e);menuData=localMenuData}}else menuData=localMenuData;renderMenu()}
        function renderMenu(){document.getElementById('menu').innerHTML=menuData.map(c=>`<div class="category"><div class="category-title">${c.category}</div>${c.items.map(i=>`<div class="item"><div class="item-info"><div class="item-name">${i.name}</div><div class="item-price">¥${i.price}</div></div><button class="add-btn" onclick="addToCart('${i.name.replace(/'/g,"\\'")}',${i.price})">+</button></div>`).join('')}</div>`).join('')}
        function addToCart(n,p){const e=cart.find(i=>i.name===n);e?e.quantity++:cart.push({name:n,price:p,quantity:1});updateCartBar()}
        function updateCartBar(){const t=cart.reduce((s,i)=>s+i.price*i.quantity,0),c=cart.reduce((s,i)=>s+i.quantity,0);document.getElementById('cartCount').textContent=c;document.getElementById('cartTotal').textContent=t;document.getElementById('cartBar').classList[c>0?'add':'remove']('show')}
        function showCart(){document.getElementById('orderItems').innerHTML=cart.map(i=>`<div class="order-item"><span>${i.name} x${i.quantity}</span><span class="order-total">¥${i.price*i.quantity}</span></div>`).join('');document.getElementById('orderTotal').textContent=cart.reduce((s,i)=>s+i.price*i.quantity,0);document.getElementById('cartModal').classList.add('show')}
        function closeCart(){document.getElementById('cartModal').classList.remove('show')}
        async function pay(){const b=document.getElementById('payBtn');b.disabled=true;b.textContent='处理中...';try{const t=cart.reduce((s,i)=>s+i.price*i.quantity,0);let on;if(API_BASE){const r=await fetch(`${API_BASE}/order`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:cart,total:t})}),d=await r.json();if(!d.success)throw new Error(d.error);on=d.orderNumber}else{await new Promise(r=>setTimeout(r,300));on='ORD'+Date.now();const o={orderNumber:on,items:[...cart],total:t,time:new Date().toISOString(),status:'已支付'},os=JSON.parse(localStorage.getItem('orders')||'[]');os.push(o);localStorage.setItem('orders',JSON.stringify(os))}document.getElementById('orderNumber').textContent=on;document.getElementById('cartModal').classList.remove('show');document.getElementById('successModal').classList.add('show');cart=[];updateCartBar()}catch(e){alert('支付失败：'+e.message);b.disabled=false;b.textContent='💳 立即支付'}}
        function closeSuccess(){document.getElementById('successModal').classList.remove('show')}
        updateCloudBadge();loadMenu();
    </script>
</body>
</html>
