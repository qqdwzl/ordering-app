<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;padding:20px}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px;border-radius:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.header h1{font-size:24px}.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:14px;text-decoration:none;display:inline-block}.btn-primary{background:white;color:#667eea}.btn-success{background:#27ae60;color:white}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}.stat-card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.stat-value{font-size:32px;font-weight:bold;color:#667eea}.stat-label{color:#666;margin-top:5px}.filters{background:white;padding:15px;border-radius:10px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}.filter-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.filter-group label{color:#666;font-size:14px}.filter-group select,.filter-group input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px}.orders-table{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.table-header{display:grid;grid-template-columns:1fr 2fr 1fr 1fr 1fr 1fr;gap:15px;padding:15px;background:#f8f9fa;font-weight:bold;color:#333;border-bottom:2px solid #e9ecef}.order-row{display:grid;grid-template-columns:1fr 2fr 1fr 1fr 1fr 1fr;gap:15px;padding:15px;border-bottom:1px solid #e9ecef;align-items:center}.order-row:last-child{border-bottom:none}.order-row:hover{background:#f8f9fa}.order-id{font-family:monospace;color:#667eea;font-weight:bold}.order-items{font-size:13px;color:#666}.order-total{font-weight:bold;color:#e74c3c}.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold}.status-pending{background:#fff3cd;color:#856404}.status-paid{background:#d4edda;color:#155724}.status-completed{background:#cce5ff;color:#004085}.action-btns{display:flex;gap:5px;flex-wrap:wrap}.action-btn{padding:4px 8px;border:none;border-radius:4px;cursor:pointer;font-size:12px}.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000}.modal.show{display:flex;justify-content:center;align-items:center}.modal-content{background:white;border-radius:15px;padding:25px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}.modal-title{font-size:20px;font-weight:bold;margin-bottom:15px}.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}.detail-label{color:#666}.detail-value{font-weight:bold}.close-btn{background:#95a5a6;color:white;border:none;padding:10px 20px;border-radius:8px;margin-top:15px;width:100%;cursor:pointer;font-size:16px}.empty-state{text-align:center;padding:60px 20px;color:#999}.empty-icon{font-size:64px;margin-bottom:15px}.loading{text-align:center;padding:40px;color:#666}.cloud-status{background:#95a5a6;color:white;padding:4px 12px;border-radius:20px;font-size:12px;margin-left:10px}
    </style>
</head>
<body>
    <div class="header"><div><h1>📋 订单管理后台 <span class="cloud-status" id="cloudStatus">📱 本地版</span></h1></div><div class="header-actions"><a href="https://ncnhcka6rbxm.feishu.cn/base/IA4Ubm6sqaGEY1sCNNvcXiwxnPc" target="_blank" class="btn btn-primary">📊 飞书表格</a><button class="btn btn-primary" onclick="exportOrders()">📥 导出</button><button class="btn btn-primary" onclick="loadOrders()">🔄 刷新</button><a href="index.html" class="btn btn-success">🏠 返回</a></div></div>
    <div class="stats"><div class="stat-card"><div class="stat-value" id="totalOrders">0</div><div class="stat-label">总订单数</div></div><div class="stat-card"><div class="stat-value" id="totalRevenue">¥0</div><div class="stat-label">总营业额</div></div><div class="stat-card"><div class="stat-value" id="pendingOrders">0</div><div class="stat-label">待处理</div></div><div class="stat-card"><div class="stat-value" id="todayOrders">0</div><div class="stat-label">今日订单</div></div></div>
    <div class="filters"><div class="filter-group"><label>状态:</label><select id="statusFilter" onchange="filterOrders()"><option value="">全部</option><option value="待支付">待支付</option><option value="已支付">已支付</option><option value="已完成">已完成</option></select></div><div class="filter-group"><label>日期:</label><input type="date" id="dateFilter" onchange="filterOrders()"></div><div class="filter-group"><label>搜索:</label><input type="text" id="searchFilter" placeholder="订单号/菜品" oninput="filterOrders()"></div></div>
    <div class="orders-table"><div class="table-header"><div>订单号</div><div>菜品详情</div><div>金额</div><div>时间</div><div>状态</div><div>操作</div></div><div id="ordersList"></div></div>
    <div class="modal" id="detailModal"><div class="modal-content"><div class="modal-title">订单详情</div><div id="orderDetail"></div><button class="close-btn" onclick="closeDetail()">关闭</button></div></div>
    <script>
        const API_BASE=window.location.hostname!=='localhost'&&window.location.hostname!=='qqdwzl.github.io'?window.location.origin+'/api':'';let allOrders=[],filteredOrders=[];
        function updateCloudStatus(){const s=document.getElementById('cloudStatus');if(API_BASE){s.textContent='☁️ 云端版';s.style.background='#27ae60'}else{s.textContent='📱 本地版';s.style.background='#95a5a6'}}
        async function loadOrders(){document.getElementById('ordersList').innerHTML='<div class="loading">加载中...</div>';try{if(API_BASE){const r=await fetch(`${API_BASE}/orders`);const d=await r.json();if(d.success)allOrders=d.orders;else throw new Error(d.error)}else{const orders=JSON.parse(localStorage.getItem('orders')||'[]');allOrders=orders.sort((a,b)=>new Date(b.time)-new Date(a.time))}filteredOrders=[...allOrders];renderOrders();updateStats()}catch(err){document.getElementById('ordersList').innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div>加载失败</div></div>`}}
        function parseItems(d){if(!d)return[];try{return d.split(',').map(i=>{const m=i.match(/(.+?)\s*x(\d+)/);return m?{name:m[1].trim(),quantity:parseInt(m[2])}:{name:i.trim(),quantity:1}})}catch{return[]}}
        function renderOrders(){const el=document.getElementById('ordersList');if(filteredOrders.length===0){el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div>暂无订单</div></div>';return}el.innerHTML=filteredOrders.map(o=>{const d=o.time?new Date(o.time):new Date();const t=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;const items=o.items||parseItems(o.菜品详情);const sc=o.status==='待支付'?'status-pending':o.status==='已完成'?'status-completed':'status-paid';return `<div class="order-row"><div class="order-id">${o.orderNumber||'-'}</div><div class="order-items">${items.map(i=>`${i.name} x${i.quantity}`).join(', ')||'-'}</div><div class="order-total">¥${o.total||0}</div><div>${t}</div><div><span class="status-badge ${sc}">${o.status||'已支付'}</span></div><div class="action-btns"><button class="action-btn btn-primary" onclick="viewDetail('${o.orderNumber}')">详情</button>${o.status!=='已完成'?`<button class="action-btn btn-success" onclick="updateStatus('${o.orderNumber}','已完成')">完成</button>`:''}</div></div>`}).join('')}
        function updateStats(){const today=new Date().toDateString();document.getElementById('totalOrders').textContent=allOrders.length;document.getElementById('totalRevenue').textContent='¥'+allOrders.reduce((s,o)=>s+(o.total||0),0);document.getElementById('pendingOrders').textContent=allOrders.filter(o=>o.status==='待支付').length;document.getElementById('todayOrders').textContent=allOrders.filter(o=>o.time&&new Date(o.time).toDateString()===today).length}
        function filterOrders(){const st=document.getElementById('statusFilter').value;const dt=document.getElementById('dateFilter').value;const sr=document.getElementById('searchFilter').value.toLowerCase();filteredOrders=allOrders.filter(o=>{if(st&&(o.status||'已支付')!==st)return false;if(dt&&o.time&&new Date(o.time).toISOString().split('T')[0]!==dt)return false;if(sr){const s=((o.orderNumber||'')+' '+(o.items?o.items.map(i=>i.name).join(' '):(o.菜品详情||''))).toLowerCase();if(!s.includes(sr))return false}return true});renderOrders()}
        function viewDetail(on){const o=allOrders.find(x=>x.orderNumber===on);if(!o)return;const d=o.time?new Date(o.time):new Date();const items=o.items||parseItems(o.菜品详情);document.getElementById('orderDetail').innerHTML=`<div class="detail-row"><span class="detail-label">订单号</span><span class="detail-value">${o.orderNumber}</span></div><div class="detail-row"><span class="detail-label">下单时间</span><span class="detail-value">${d.toLocaleString('zh-CN')}</span></div><div class="detail-row"><span class="detail-label">订单状态</span><span class="detail-value">${o.status||'已支付'}</span></div><div class="detail-row" style="flex-direction:column;align-items:flex-start"><span class="detail-label">菜品详情</span><div style="margin-top:10px">${items.map(i=>`<div style="display:flex;justify-content:space-between;padding:5px 0"><span>${i.name} x${i.quantity}</span><span>¥${i.price*i.quantity}</span></div>`).join('')}</div></div><div class="detail-row"><span class="detail-label">总金额</span><span class="detail-value" style="color:#e74c3c;font-size:18px">¥${o.total||0}</span></div>`;document.getElementById('detailModal').classList.add('show')}
        function closeDetail(){document.getElementById('detailModal').classList.remove('show')}
        async function updateStatus(on,ns){const o=allOrders.find(x=>x.orderNumber===on);if(o){o.status=ns;localStorage.setItem('orders',JSON.stringify(allOrders));loadOrders();alert(`订单 ${on} 已标记为"${ns}"`)}}
        function exportOrders(){if(allOrders.length===0){alert('暂无订单');return}let csv='订单号，下单时间，菜品详情，总金额，状态\n';allOrders.forEach(o=>{const items=o.items?o.items.map(i=>`${i.name}x${i.quantity}`).join(';'):(o.菜品详情||'');const date=o.time?new Date(o.time).toLocaleString('zh-CN'):'';csv+=`${o.orderNumber},"${date}","${items}",${o.total||0},${o.status||'已支付'}\n`});const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`订单导出_${new Date().toISOString().split('T')[0]}.csv`;link.click()}
        updateCloudStatus();loadOrders();setInterval(loadOrders,30000);
    </script>
</body>
</html>
