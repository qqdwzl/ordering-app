<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .header-actions { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
        .btn-primary { background: white; color: #667eea; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        .filters { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { color: #666; font-size: 14px; }
        .filter-group select, .filter-group input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .orders-table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .table-header { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr 1fr; gap: 15px; padding: 15px; background: #f8f9fa; font-weight: bold; color: #333; border-bottom: 2px solid #e9ecef; }
        .order-row { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr 1fr; gap: 15px; padding: 15px; border-bottom: 1px solid #e9ecef; align-items: center; }
        .order-row:last-child { border-bottom: none; }
        .order-row:hover { background: #f8f9fa; }
        .order-id { font-family: monospace; color: #667eea; font-weight: bold; }
        .order-items { font-size: 13px; color: #666; }
        .order-total { font-weight: bold; color: #e74c3c; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-paid { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .action-btns { display: flex; gap: 5px; }
        .action-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.show { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 15px; padding: 25px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .detail-label { color: #666; }
        .detail-value { font-weight: bold; }
        .close-btn { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px; width: 100%; cursor: pointer; font-size: 16px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-icon { font-size: 64px; margin-bottom: 15px; }
        .refresh-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 订单管理后台</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="exportOrders()">📥 导出 Excel</button>
            <button class="btn btn-primary" onclick="loadOrders()">🔄 刷新</button>
            <a href="index.html" class="btn btn-success" style="text-decoration: none;">🏠 返回点餐页</a>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalOrders">0</div>
            <div class="stat-label">总订单数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalRevenue">¥0</div>
            <div class="stat-label">总营业额</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="pendingOrders">0</div>
            <div class="stat-label">待处理</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="todayOrders">0</div>
            <div class="stat-label">今日订单</div>
        </div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>状态:</label>
            <select id="statusFilter" onchange="filterOrders()">
                <option value="">全部</option>
                <option value="待支付">待支付</option>
                <option value="已支付">已支付</option>
                <option value="已完成">已完成</option>
            </select>
        </div>
        <div class="filter-group">
            <label>日期:</label>
            <input type="date" id="dateFilter" onchange="filterOrders()">
        </div>
        <div class="filter-group">
            <label>搜索:</label>
            <input type="text" id="searchFilter" placeholder="订单号/菜品" oninput="filterOrders()">
        </div>
    </div>

    <div class="orders-table">
        <div class="table-header">
            <div>订单号</div>
            <div>菜品详情</div>
            <div>金额</div>
            <div>时间</div>
            <div>状态</div>
            <div>操作</div>
        </div>
        <div id="ordersList"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-title">订单详情</div>
            <div id="orderDetail"></div>
            <button class="close-btn" onclick="closeDetail()">关闭</button>
        </div>
    </div>

    <script>
        let allOrders = [];
        let filteredOrders = [];

        // 加载订单
        async function loadOrders() {
            const ordersList = document.getElementById('ordersList');
            ordersList.innerHTML = '<div class="loading">加载中...</div>';

            try {
                // 从 localStorage 读取（本地版）
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                
                // 如果有后端 API，可以改用：
                // const res = await fetch('/api/orders');
                // const orders = await res.json();
                
                allOrders = orders.sort((a, b) => new Date(b.time) - new Date(a.time));
                filteredOrders = [...allOrders];
                
                renderOrders();
                updateStats();
            } catch (err) {
                ordersList.innerHTML = '<div class="empty-state">加载失败</div>';
                console.error(err);
            }
        }

        // 渲染订单列表
        function renderOrders() {
            const ordersList = document.getElementById('ordersList');
            
            if (filteredOrders.length === 0) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div>暂无订单</div>
                    </div>
                `;
                return;
            }

            ordersList.innerHTML = filteredOrders.map(order => {
                const date = new Date(order.time);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                const statusClass = `status-${getStatusClass(order.status || '已支付')}`;
                
                return `
                    <div class="order-row">
                        <div class="order-id">${order.orderNumber}</div>
                        <div class="order-items">${order.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
                        <div class="order-total">¥${order.total}</div>
                        <div>${timeStr}</div>
                        <div><span class="status-badge ${statusClass}">${order.status || '已支付'}</span></div>
                        <div class="action-btns">
                            <button class="action-btn btn-primary" onclick="viewDetail('${order.orderNumber}')">详情</button>
                            ${order.status !== '已完成' ? `<button class="action-btn btn-success" onclick="updateStatus('${order.orderNumber}', '已完成')">完成</button>` : ''}
                            ${order.status === '待支付' ? `<button class="action-btn btn-danger" onclick="updateStatus('${order.orderNumber}', '已取消')">取消</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 获取状态样式
        function getStatusClass(status) {
            const map = {
                '待支付': 'pending',
                '已支付': 'paid',
                '已完成': 'completed',
                '已取消': 'cancelled'
            };
            return map[status] || 'paid';
        }

        // 更新统计
        function updateStats() {
            const today = new Date().toDateString();
            
            document.getElementById('totalOrders').textContent = allOrders.length;
            document.getElementById('totalRevenue').textContent = '¥' + allOrders.reduce((sum, o) => sum + o.total, 0);
            document.getElementById('pendingOrders').textContent = allOrders.filter(o => o.status === '待支付').length;
            document.getElementById('todayOrders').textContent = allOrders.filter(o => new Date(o.time).toDateString() === today).length;
        }

        // 筛选订单
        function filterOrders() {
            const status = document.getElementById('statusFilter').value;
            const date = document.getElementById('dateFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();

            filteredOrders = allOrders.filter(order => {
                if (status && (order.status || '已支付') !== status) return false;
                if (date && new Date(order.time).toISOString().split('T')[0] !== date) return false;
                if (search) {
                    const searchStr = (order.orderNumber + ' ' + order.items.map(i => i.name).join(' ')).toLowerCase();
                    if (!searchStr.includes(search)) return false;
                }
                return true;
            });

            renderOrders();
        }

        // 查看详情
        function viewDetail(orderNumber) {
            const order = allOrders.find(o => o.orderNumber === orderNumber);
            if (!order) return;

            const date = new Date(order.time);
            const detail = `
                <div class="detail-row">
                    <span class="detail-label">订单号</span>
                    <span class="detail-value">${order.orderNumber}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">下单时间</span>
                    <span class="detail-value">${date.toLocaleString('zh-CN')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">订单状态</span>
                    <span class="detail-value">${order.status || '已支付'}</span>
                </div>
                <div class="detail-row" style="flex-direction: column; align-items: flex-start;">
                    <span class="detail-label">菜品详情</span>
                    <div style="margin-top: 10px;">
                        ${order.items.map(i => `
                            <div style="display: flex; justify-content: space-between; padding: 5px 0;">
                                <span>${i.name} x${i.quantity}</span>
                                <span>¥${i.price * i.quantity}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="detail-row">
                    <span class="detail-label">总金额</span>
                    <span class="detail-value" style="color: #e74c3c; font-size: 18px;">¥${order.total}</span>
                </div>
            `;

            document.getElementById('orderDetail').innerHTML = detail;
            document.getElementById('detailModal').classList.add('show');
        }

        // 关闭详情
        function closeDetail() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 更新状态
        function updateStatus(orderNumber, newStatus) {
            const order = allOrders.find(o => o.orderNumber === orderNumber);
            if (order) {
                order.status = newStatus;
                localStorage.setItem('orders', JSON.stringify(allOrders));
                loadOrders();
                alert(`订单 ${orderNumber} 已标记为"${newStatus}"`);
            }
        }

        // 导出 Excel
        function exportOrders() {
            if (allOrders.length === 0) {
                alert('暂无订单可导出');
                return;
            }

            let csv = '订单号，下单时间，菜品详情，总金额，状态\n';
            allOrders.forEach(order => {
                const items = order.items.map(i => `${i.name}x${i.quantity}`).join(';');
                const date = new Date(order.time).toLocaleString('zh-CN');
                csv += `${order.orderNumber},"${date}","${items}",${order.total},${order.status || '已支付'}\n`;
            });

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `订单导出_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // 初始化
        loadOrders();
        
        // 自动刷新（每 30 秒）
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
